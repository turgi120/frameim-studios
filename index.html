<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frameim Studios</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 680px;
      padding: 2rem;
    }

    .logo {
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      color: #ffffff;
    }

    h1 span {
      color: #c8a96e;
    }

    .description {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #aaa;
      margin-bottom: 2.5rem;
    }

    .contact-btn {
      display: inline-block;
      padding: 0.9rem 2.4rem;
      background-color: #c8a96e;
      color: #0d0d0d;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 4px;
      transition: background-color 0.2s ease, transform 0.1s ease;
      border: none;
      cursor: pointer;
    }

    .contact-btn:hover {
      background-color: #d4b97e;
      transform: translateY(-1px);
    }

    .divider {
      width: 40px;
      height: 2px;
      background-color: #c8a96e;
      margin: 0 auto 2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="logo">Frameim Studios</p>
    <h1>שלום עולם</h1>
    <div class="divider"></div>
    <p class="description">
      סטודיו הפקה בוטיק המתמחה בתוכן קולנועי, פרסומות ווידאו דיגיטלי.
      אנו מאמינים שכל פרויקט הוא הזדמנות לספר סיפור אמיתי — בדיוק, בסגנון, ובלב.
    </p>
    <a href="mailto:hello@frameimstudios.com" class="contact-btn">צרו קשר</a>
  </div>
</body>
</html>

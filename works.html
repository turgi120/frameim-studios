<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עבודות | פריימים סטודיו</title>
</head>
<body>

  <header>
    <a href="index.html"><img src="frameim-logo.png" alt="FRAMEIM" style="height:32px;width:auto;display:block;"></a>
    <nav>
      <a href="index.html">בית</a>
      <a href="works.html">עבודות</a>
      <a href="index.html#about">עלינו</a>
      <a href="index.html#contact">צור קשר</a>
    </nav>
  </header>

  <section>
    <h1>העבודות שלנו</h1>
  </section>

  <section>
    <div id="works-grid">
      <p>טוען סרטונים...</p>
    </div>
  </section>

  <section id="contact">
    <h2>מוכנים ליצור ביחד?</h2>
    <p>השאירו פרטים ונחזור אליכם לשיחת ייעוץ חינמית.</p>
    <div class="lead-form-container" data-source="works"></div>
  </section>

  <footer>
    <p>כל הזכויות שמורות לסטודיו פריימים</p>
    <a href="privacy.html">מדיניות פרטיות</a>
  </footer>

  <div id="lightbox" style="display:none">
    <button id="lightbox-close">סגור ✕</button>
    <div id="lightbox-inner">
      <iframe id="lightbox-frame" allowfullscreen allow="autoplay" style="width:100%;height:100%;border:none"></iframe>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    const WORKS_API = 'https://script.google.com/macros/s/AKfycbzLRTXhwajmDfceJrm4gBfv99jv8giHYONf7JBZUJ0Royis5vXvlQtoy3YJx3Ja9Cnq/exec?action=get_works';
    const grid     = document.getElementById('works-grid');
    const lightbox = document.getElementById('lightbox');
    const frame    = document.getElementById('lightbox-frame');

    async function loadWorks() {
      try {
        const res  = await fetch(WORKS_API);
        const data = await res.json();
        grid.innerHTML = '';
        if (!data.videos || data.videos.length === 0) {
          grid.innerHTML = '<p>אין עבודות להצגה כרגע.</p>';
          return;
        }
        data.videos.forEach(video => {
          const card = document.createElement('div');
          card.innerHTML = `<a href="#" data-embed="${video.embed}">${video.name}</a>`;
          card.querySelector('a').addEventListener('click', e => {
            e.preventDefault();
            frame.src = video.embed;
            lightbox.style.display = 'block';
          });
          grid.appendChild(card);
        });
      } catch {
        grid.innerHTML = '<p>לא ניתן לטעון את הסרטונים כרגע. נסה לרענן את הדף.</p>';
      }
    }

    document.getElementById('lightbox-close').addEventListener('click', () => {
      lightbox.style.display = 'none';
      frame.src = '';
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { lightbox.style.display = 'none'; frame.src = ''; }
    });

    loadWorks();
  </script>
</body>
</html>

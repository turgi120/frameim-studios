<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="העבודות של פריימים סטודיו — סרטוני מותג, קמפיינים ותוכן לרשתות חברתיות." />
  <title>עבודות | פריימים סטודיו</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Frank+Ruhl+Libre:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Works Grid ── */
    .works-page { background: var(--ink); min-height: 100vh; }

    .works-hero-section {
      padding: 120px 0 60px;
      background: var(--ink);
    }

    .works-hero-section .hero-label { color: var(--accent); }
    .works-hero-section .hero-label::before { background: var(--accent); }

    .works-hero-section h1 {
      font-size: clamp(64px, 10vw, 140px);
      font-weight: 900;
      line-height: 0.96;
      letter-spacing: -0.04em;
      color: var(--white);
    }

    .works-hero-section h1 .f {
      font-family: var(--font-serif);
      font-weight: 300;
      font-style: italic;
    }

    /* Grid */
    .grid-section { padding: 0 0 120px; background: var(--ink); }

    #works-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }

    .work-card {
      position: relative;
      aspect-ratio: 9/16;
      overflow: hidden;
      background: #1a1814;
      cursor: pointer;
    }

    .work-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease, opacity 0.3s ease;
      opacity: 0.75;
      display: block;
    }

    .work-card:hover img { transform: scale(1.05); opacity: 1; }

    .work-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(14,13,11,0.9) 0%, transparent 55%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .work-card:hover .work-card-overlay { opacity: 1; }

    .work-card-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      width: 56px;
      height: 56px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .work-card-play svg { width: 22px; height: 22px; fill: #fff; margin-right: -3px; }

    .work-card:hover .work-card-play {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .work-card-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    /* Skeleton loaders */
    .work-skeleton {
      aspect-ratio: 9/16;
      background: linear-gradient(90deg, #1a1814 25%, #2a2620 50%, #1a1814 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Empty / Error states */
    .works-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 100px 40px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #lightbox.open { display: flex; }

    .lightbox-inner {
      position: relative;
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      background: #000;
    }

    /* portrait videos */
    .lightbox-inner.portrait {
      max-width: 420px;
      aspect-ratio: 9/16;
      max-height: 85vh;
    }

    #lightbox-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #lightbox-close {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 44px;
      height: 44px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.2s;
      z-index: 10001;
    }

    #lightbox-close:hover { background: var(--ink); }

    /* Lead form on dark bg */
    .works-form-section {
      background: var(--ink);
      padding: 0 0 120px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    @media (max-width: 768px) {
      #works-grid { grid-template-columns: repeat(2, 1fr); }
      .works-hero-section { padding: 100px 0 40px; }
    }

    @media (max-width: 480px) {
      #works-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

    <button class="mobile-nav-close" id="mobile-nav-close">✕</button>

    <a href="works.html">עבודות</a>

  </nav>

  <!-- HERO -->
  <section class="works-hero-section">
    <div class="container">

  <!-- VIDEO GRID -->

    <div id="works-grid">

      <div class="work-skeleton"></div>
      <div class="work-skeleton"></div>
      <div class="work-skeleton"></div>
      <div class="work-skeleton"></div>
      <div class="work-skeleton"></div>
      <div class="work-skeleton"></div>
    </div>
  </section>

  <!-- LEAD FORM -->
  <section class="works-form-section" id="contact">
    <div class="container">
      <div class="form-grid">
        <div data-reveal>
          <h2 class="form-headline">
            <span class="f">מוכנים</span><br>
            ליצור<br>

  <!-- LIGHTBOX -->

      <button class="cookie-btn cookie-decline" id="cookie-decline">דחה</button>

  <script src="js/main.js"></script>
  <script>
    const WORKS_API = 'https://script.google.com/macros/s/AKfycbzLRTXhwajmDfceJrm4gBfv99jv8giHYONf7JBZUJ0Royis5vXvlQtoy3YJx3Ja9Cnq/exec?action=get_works';
    const grid      = document.getElementById('works-grid');
    const lightbox  = document.getElementById('lightbox');
    const frame     = document.getElementById('lightbox-frame');
    const lbInner   = document.getElementById('lightbox-inner');

    // ── Fetch videos from Drive via Apps Script ──
    async function loadWorks() {
      try {
        const res  = await fetch(WORKS_API);
        const data = await res.json();

        grid.innerHTML = '';

        if (!data.videos || data.videos.length === 0) {
          grid.innerHTML = '<div class="works-state">אין עבודות להצגה כרגע.</div>';
          return;
        }

        data.videos.forEach(video => {
          const card = document.createElement('div');
          card.className = 'work-card';
          card.innerHTML = `
            <img
              src="${video.thumb}"
              alt="${video.name}"
              loading="lazy"
              onerror="this.style.background='#1a1814';this.style.display='block'"
            />
            <div class="work-card-play">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="work-card-overlay">
              <p class="work-card-name">${video.name}</p>
            </div>
          `;
          card.addEventListener('click', () => openLightbox(video.embed, video.name));
          grid.appendChild(card);
        });

      } catch {
        grid.innerHTML = '<div class="works-state">לא ניתן לטעון את הסרטונים כרגע.<br>נסה לרענן את הדף.</div>';
      }
    }

    // ── Lightbox ──
    function openLightbox(embedUrl, name) {
      frame.src = embedUrl;
      // portrait if aspect ratio suggests vertical video
      lbInner.classList.toggle('portrait', true); // Drive videos are usually 9:16
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      frame.src = '';
      document.body.style.overflow = '';
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    loadWorks();
  </script>
</body>

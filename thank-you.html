<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תודה! | פריימים סטודיו</title>
</head>
<body>

  <h1>תודה רבה!</h1>
  <p id="thank-msg">פרטייך התקבלו בהצלחה. ניצור איתך קשר בהקדם לתיאום שיחת הכרות.</p>
  <a href="index.html">חזרה לדף הבית</a>
  &nbsp;
  <a href="works.html">לעבודות שלנו</a>

  <script src="js/main.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('booked') === '1') {
      document.getElementById('thank-msg').innerHTML =
        'הפגישה נקבעה בהצלחה! פרטים יישלחו אליך במייל. מצפים לשיחה!';

      const email = sessionStorage.getItem('frameim_lead_email') || '';
      if (email) {
        const fd = new FormData();
        fd.append('action',         'update_booking');
        fd.append('email',          email);
        fd.append('meeting_booked', 'כן');
        fd.append('meeting_date',   new Date().toLocaleString('he-IL'));
        fetch('https://script.google.com/macros/s/AKfycbzLRTXhwajmDfceJrm4gBfv99jv8giHYONf7JBZUJ0Royis5vXvlQtoy3YJx3Ja9Cnq/exec',
          { method: 'POST', body: fd, mode: 'no-cors' }
        ).catch(() => {});
        sessionStorage.removeItem('frameim_lead_email');
      }
    }
  </script>
</body>
</html>

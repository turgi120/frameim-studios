<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>קביעת פגישה | פריימים סטודיו</title>
  <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
</head>
<body>

  <header>
    <a href="index.html"><img src="frameim-logo.png" alt="FRAMEIM" style="height:32px;width:auto;display:block;"></a>
    <nav>
      <a href="index.html">בית</a>
      <a href="works.html">עבודות</a>
    </nav>
  </header>

  <section>
    <h1>קביעת פגישה</h1>
    <p>בחרו זמן שנוח לכם — שיחת הכרות של 30 דקות, ללא עלות.</p>
    <div
      id="calendly-widget"
      class="calendly-inline-widget"
      style="min-width:320px;height:700px;">
    </div>
  </section>

  <footer>
    <p>כל הזכויות שמורות לסטודיו פריימים</p>
    <a href="privacy.html">מדיניות פרטיות</a>
  </footer>

  <script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript"></script>
  <script src="js/main.js"></script>
  <script>
    const _params = new URLSearchParams(window.location.search);
    const _email  = _params.get('email') || '';
    if (_email) sessionStorage.setItem('frameim_lead_email', _email);

    const _base = 'https://calendly.com/il-frameim/30min';
    const _qs   = new URLSearchParams({
      hide_gdpr_banner: '1',
      email: _email,
    });
    document.getElementById('calendly-widget').dataset.url = `${_base}?${_qs}`;
    Calendly.initInlineWidgets();
  </script>
</body>
</html>

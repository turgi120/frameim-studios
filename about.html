<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אודות | Frameim Studios</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2.5rem;
      background-color: #111;
      border-bottom: 1px solid #1e1e1e;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #ffffff;
      text-decoration: none;
    }

    .header-logo span {
      color: #c8a96e;
    }

    nav {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    nav a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.2s ease;
    }

    nav a:hover,
    nav a.active {
      color: #c8a96e;
    }

    /* Main content */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 680px;
      padding: 2rem;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      color: #ffffff;
    }

    h1 span {
      color: #c8a96e;
    }

    .divider {
      width: 40px;
      height: 2px;
      background-color: #c8a96e;
      margin: 0 auto 2rem;
    }

    .description {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #aaa;
      margin-bottom: 2.5rem;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="header-logo">Frameim <span>Studios</span></a>
    <nav>
      <a href="index.html">בית</a>
      <a href="about.html" class="active">אודות</a>
      <a href="services.html">שירותים</a>
      <a href="mailto:hello@frameimstudios.com">צור קשר</a>
    </nav>
  </header>

  <main>
    <div class="container">
      <h1>אודות <span>Frameim</span></h1>
      <div class="divider"></div>
      <p class="description">
        Frameim Studios הוא סטודיו הפקה בוטיק שנוסד מתוך אהבה לסיפור חזותי.
        אנו עובדים עם מותגים, יוצרים ועסקים כדי להפוך רעיונות לתוכן קולנועי
        שמרגש, מעורר עניין ונשאר בזיכרון.
      </p>
    </div>
  </main>
</body>
</html>
